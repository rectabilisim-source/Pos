name: APK Derle

on:
  push:
    branches: [main, master]
  workflow_dispatch:     # GitHub'da elle tetiklemek için buton

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle-wrapper.jar olmadan çalışır
      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: APK derle (debug)
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: APK'yı indir olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: RectaPOS-Notifier
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
